# Tabla de Usuarios (Sincronizada con Firebase Auth)
type User @table {
  id: String! @default(expr: "auth.uid")
  nombre: String
  email: String
  rol: String # "admin", "staff", "cliente"
}

# Configuraciones Globales
type Configuracion @table {
  id: String! # ej. "precios_base"
  precioAdulto: Float!
  precioNino: Float!
  precioMayor: Float!
}

# Paquetes Creados por Admin
type Paquete @table {
  id: UUID! @default(expr: "uuidV4()")
  nombre: String!
  descripcion: String!
  precioBase: Float!
  incluyePersonas: Int!
  activo: Boolean!
}

# Servicios mostrados en la landing (editables por personal)
type Servicio @table {
  id: UUID! @default(expr: "uuidV4()")
  titulo: String!
  descripcion: String!
  orden: Int!
  activo: Boolean!
}

# Contenido singleton de la landing (id fijo "main")
type LandingPage @table {
  id: String!
  descripcionParque: String!
  mapaDistribucionJson: String!
  imagenSatelitalUrl: String!
  googleMapsUrl: String!
  horariosTexto: String!
  abiertoAhora: Boolean!
  ocupacionTexto: String!
  estacionamientoTexto: String!
  botonesJson: String!
}

# Códigos de Descuento
type Descuento @table {
  id: UUID! @default(expr: "uuidV4()")
  codigo: String! @unique
  descuento: Float!
  tipo: String! # "monto" | "porcentaje"
  usosRestantes: Int!
}

# Tickets de Acceso / Reservas
type Ticket @table {
  id: UUID! @default(expr: "uuidV4()")
  
  # Relación opcional con un usuario registrado (Firebase Auth)
  user: User
  
  clienteNombre: String!
  clienteEmail: String!
  
  metodoPago: String! # "online" | "taquilla"
  estadoPago: String! # "pagado" | "pendiente"
  estadoTicket: String! # "valido" | "escaneado" | "cancelado"
  
  precioTotal: Float!
  fechaCreacion: Timestamp! @default(expr: "request.time")
  fechaEscaneo: Timestamp
}
