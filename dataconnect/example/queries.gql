# Queries para el Sistema de Reservas y Tickets

# Obtener un Ticket específico por su ID (Para el Escáner)
query GetTicketById($id: UUID!) @auth(level: PUBLIC) {
  ticket(id: $id) {
    id
    clienteNombre
    clienteEmail
    metodoPago
    estadoPago
    estadoTicket
    precioTotal
    fechaCreacion
    fechaEscaneo
    user {
      id
      nombre
      email
    }
  }
}

# Obtener los 10 tickets más recientes (Para el Admin Dashboard)
query ListRecentTickets @auth(level: PUBLIC) {
  tickets(orderBy: [{fechaCreacion: DESC}], limit: 10) {
    id
    clienteNombre
    clienteEmail
    estadoPago
    estadoTicket
    precioTotal
    fechaCreacion
  }
}

# Obtener el perfil del usuario autenticado y su rol
query GetUserProfile($id: String!) @auth(level: USER) {
  user(id: $id) {
    id
    email
    nombre
    rol
  }
}

# Obtener los tickets de un usuario
query ListUserTickets($userId: String!) @auth(level: USER) {
  tickets(where: { userId: { eq: $userId } }, orderBy: [{fechaCreacion: DESC}]) {
    id
    clienteNombre
    clienteEmail
    metodoPago
    estadoPago
    estadoTicket
    precioTotal
    fechaCreacion
    fechaEscaneo
  }
}

# Obtener paquetes activos para la Landing
query ListPaquetes @auth(level: PUBLIC) {
  paquetes(where: { activo: { eq: true } }, orderBy: [{ precioBase: ASC }]) {
    id
    nombre
    descripcion
    precioBase
    incluyePersonas
    activo
  }
}

# Contenido público de la landing (fila id = main)
query GetLandingPage($id: String!) @auth(level: PUBLIC) {
  landingPage(id: $id) {
    id
    descripcionParque
    mapaDistribucionJson
    mapaMesasJson
    mapaEstacionamientoJson
    imagenSatelitalUrl
    googleMapsUrl
    horariosTexto
    abiertoAhora
    ocupacionTexto
    estacionamientoTexto
    botonesJson
  }
}

# Servicios activos ordenados para la landing
query ListServiciosLanding @auth(level: PUBLIC) {
  servicios(where: { activo: { eq: true } }, orderBy: [{ orden: ASC }]) {
    id
    titulo
    descripcion
    imagenUrl
    precio
    orden
    activo
  }
}

# Todos los servicios (panel admin / trabajador)
query ListServiciosAdmin @auth(level: USER) {
  servicios(orderBy: [{ orden: ASC }]) {
    id
    titulo
    descripcion
    imagenUrl
    precio
    orden
    activo
  }
}

# Inventario para panel (jefe / trabajador)
query ListProductosAdmin @auth(level: USER) {
  productos(orderBy: [{ fechaCreacion: DESC }]) {
    id
    titulo
    descripcion
    imagenUrl
    precio
    stockActual
    reservadoAprox
    activo
    fechaCreacion
  }
}

query ListProductosPublic @auth(level: PUBLIC) {
  productos(where: { activo: { eq: true } }, orderBy: [{ fechaCreacion: DESC }]) {
    id
    titulo
    descripcion
    imagenUrl
    precio
    stockActual
    reservadoAprox
    activo
    fechaCreacion
  }
}

query ListMovimientosInventario($productoId: UUID!) @auth(level: USER) {
  movimientoInventarios(
    where: { productoId: { eq: $productoId } }
    orderBy: [{ fechaCreacion: DESC }]
    limit: 30
  ) {
    id
    tipo
    cantidad
    nota
    fechaCreacion
    creadoPor {
      id
      nombre
      email
    }
  }
}

# Mapa público: ítems apartados en una fecha (solo ids, sin datos personales)
query ListMesaReservasActivasPorFecha($fechaDia: String!) @auth(level: PUBLIC) {
  mesaReservas(
    where: {
      fechaDia: { eq: $fechaDia }
      estado: { eq: "apartada" }
    }
  ) {
    mapItemId
  }
}

# Comprobar si una mesa ya está apartada (antes de insertar)
query CheckMesaReservaLibre($fechaDia: String!, $mapItemId: String!) @auth(level: PUBLIC) {
  mesaReservas(
    where: {
      fechaDia: { eq: $fechaDia }
      mapItemId: { eq: $mapItemId }
      estado: { eq: "apartada" }
    }
    limit: 1
  ) {
    id
  }
}

# Mis reservas de mesa (el cliente pasa su uid; mismo patrón que ListUserTickets)
query ListMisMesaReservas($userId: String!) @auth(level: USER) {
  mesaReservas(
    where: { userId: { eq: $userId } }
    orderBy: [{ creadoEn: DESC }]
    limit: 80
  ) {
    id
    fechaDia
    mapItemId
    estado
    creadoEn
    ticket {
      id
    }
  }
}
