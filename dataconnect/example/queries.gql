# Queries para el Sistema de Reservas y Tickets

# Obtener un Ticket específico por su ID (Para el Escáner)
query GetTicketById($id: UUID!) @auth(level: PUBLIC) {
  ticket(id: $id) {
    id
    clienteNombre
    clienteEmail
    metodoPago
    estadoPago
    estadoTicket
    precioTotal
    fechaCreacion
    fechaEscaneo
    user {
      id
      nombre
      email
    }
  }
}

# Obtener los 10 tickets más recientes (Para el Admin Dashboard)
query ListRecentTickets @auth(level: PUBLIC) {
  tickets(orderBy: [{fechaCreacion: DESC}], limit: 10) {
    id
    clienteNombre
    clienteEmail
    estadoPago
    estadoTicket
    precioTotal
    fechaCreacion
  }
}

# Obtener el perfil del usuario autenticado y su rol
query GetUserProfile($id: String!) @auth(level: USER) {
  user(id: $id) {
    id
    email
    nombre
    rol
  }
}

# Obtener los tickets de un usuario
query ListUserTickets($userId: String!) @auth(level: USER) {
  tickets(where: { userId: { eq: $userId } }, orderBy: [{fechaCreacion: DESC}]) {
    id
    clienteNombre
    estadoPago
    estadoTicket
    precioTotal
    fechaCreacion
  }
}

# Obtener paquetes activos para la Landing
query ListPaquetes @auth(level: PUBLIC) {
  paquetes(where: { activo: { eq: true } }, orderBy: [{ precioBase: ASC }]) {
    id
    nombre
    descripcion
    precioBase
    incluyePersonas
    activo
  }
}
