# Mutations para el Sistema de Reservas y Tickets

# Crea un ticket anónimo (Ej. compra rápida en Landing)
mutation CreateAnonymousTicket(
  $clienteNombre: String!, 
  $clienteEmail: String!, 
  $metodoPago: String!, 
  $estadoPago: String!, 
  $precioTotal: Float!
) @auth(level: PUBLIC) {
  ticket_insert(data: {
    clienteNombre: $clienteNombre,
    clienteEmail: $clienteEmail,
    metodoPago: $metodoPago,
    estadoPago: $estadoPago,
    estadoTicket: "valido",
    precioTotal: $precioTotal
  })
}

# Crea un ticket vinculado al UID del usuario actual en Firebase Auth
mutation CreateUserTicket(
  $clienteNombre: String!, 
  $clienteEmail: String!, 
  $metodoPago: String!, 
  $estadoPago: String!, 
  $precioTotal: Float!
) @auth(level: USER) {
  ticket_insert(data: {
    userId_expr: "auth.uid",
    clienteNombre: $clienteNombre,
    clienteEmail: $clienteEmail,
    metodoPago: $metodoPago,
    estadoPago: $estadoPago,
    estadoTicket: "valido",
    precioTotal: $precioTotal
  })
}

# Actualiza el estado de un ticket al ser escaneado por el personal
mutation UpdateTicketStatus(
  $id: UUID!, 
  $estadoTicket: String!, 
  $estadoPago: String!
) @auth(level: PUBLIC) {
  ticket_update(
    id: $id,
    data: {
      estadoTicket: $estadoTicket,
      estadoPago: $estadoPago,
      fechaEscaneo_expr: "request.time"
    }
  )
}

# Crear un Paquete Especial (Desde Admin Dashboard)
mutation CreatePaquete(
  $nombre: String!, 
  $descripcion: String!, 
  $precioBase: Float!, 
  $incluyePersonas: Int!
) @auth(level: PUBLIC) {
  paquete_insert(data: {
    nombre: $nombre,
    descripcion: $descripcion,
    precioBase: $precioBase,
    incluyePersonas: $incluyePersonas,
    activo: true
  })
}

# Crear o actualizar usuario desde Auth
mutation UpsertUser(
  $id: String!,
  $email: String!,
  $nombre: String!,
  $rol: String!
) @auth(level: USER) {
  user_upsert(data: {
    id: $id,
    email: $email,
    nombre: $nombre,
    rol: $rol
  })
}

# Contenido de la landing (personal autenticado)
mutation UpsertLandingPage(
  $id: String!,
  $descripcionParque: String!,
  $mapaDistribucionJson: String!,
  $mapaMesasJson: String!,
  $mapaEstacionamientoJson: String!,
  $imagenSatelitalUrl: String!,
  $googleMapsUrl: String!,
  $horariosTexto: String!,
  $abiertoAhora: Boolean!,
  $ocupacionTexto: String!,
  $estacionamientoTexto: String!,
  $botonesJson: String!
) @auth(level: USER) {
  landingPage_upsert(data: {
    id: $id,
    descripcionParque: $descripcionParque,
    mapaDistribucionJson: $mapaDistribucionJson,
    mapaMesasJson: $mapaMesasJson,
    mapaEstacionamientoJson: $mapaEstacionamientoJson,
    imagenSatelitalUrl: $imagenSatelitalUrl,
    googleMapsUrl: $googleMapsUrl,
    horariosTexto: $horariosTexto,
    abiertoAhora: $abiertoAhora,
    ocupacionTexto: $ocupacionTexto,
    estacionamientoTexto: $estacionamientoTexto,
    botonesJson: $botonesJson
  })
}

mutation CreateServicio(
  $titulo: String!,
  $descripcion: String!,
  $imagenUrl: String!,
  $precio: Float!,
  $orden: Int!,
  $activo: Boolean!
) @auth(level: PUBLIC) {
  servicio_insert(data: {
    titulo: $titulo,
    descripcion: $descripcion,
    imagenUrl: $imagenUrl,
    precio: $precio,
    orden: $orden,
    activo: $activo
  })
}

mutation UpdateServicio(
  $id: UUID!,
  $titulo: String!,
  $descripcion: String!,
  $imagenUrl: String!,
  $precio: Float!,
  $orden: Int!,
  $activo: Boolean!
) @auth(level: PUBLIC) {
  servicio_update(
    id: $id,
    data: {
      titulo: $titulo,
      descripcion: $descripcion,
      imagenUrl: $imagenUrl,
      precio: $precio,
      orden: $orden,
      activo: $activo
    }
  )
}

mutation CreateProducto(
  $titulo: String!,
  $descripcion: String!,
  $imagenUrl: String!,
  $precio: Float!,
  $stockActual: Int!,
  $reservadoAprox: Int!,
  $activo: Boolean!
) @auth(level: USER) {
  producto_insert(data: {
    titulo: $titulo,
    descripcion: $descripcion,
    imagenUrl: $imagenUrl,
    precio: $precio,
    stockActual: $stockActual,
    reservadoAprox: $reservadoAprox,
    activo: $activo
  })
}

mutation UpdateProducto(
  $id: UUID!,
  $titulo: String!,
  $descripcion: String!,
  $imagenUrl: String!,
  $precio: Float!,
  $activo: Boolean!
) @auth(level: USER) {
  producto_update(
    id: $id,
    data: {
      titulo: $titulo,
      descripcion: $descripcion,
      imagenUrl: $imagenUrl,
      precio: $precio,
      activo: $activo
    }
  )
}

mutation UpdateProductoStock(
  $id: UUID!,
  $stockActual: Int!,
  $reservadoAprox: Int!
) @auth(level: USER) {
  producto_update(
    id: $id,
    data: {
      stockActual: $stockActual,
      reservadoAprox: $reservadoAprox
    }
  )
}

mutation CreateMovimientoInventario(
  $productoId: UUID!,
  $tipo: String!,
  $cantidad: Int!,
  $nota: String!
) @auth(level: USER) {
  movimientoInventario_insert(data: {
    productoId: $productoId,
    creadoPorId_expr: "auth.uid",
    tipo: $tipo,
    cantidad: $cantidad,
    nota: $nota
  })
}

mutation CreateMesaReserva($fechaDia: String!, $mapItemId: String!) @auth(level: USER) {
  mesaReserva_insert(data: {
    fechaDia: $fechaDia,
    mapItemId: $mapItemId,
    estado: "apartada",
    userId_expr: "auth.uid"
  })
}

mutation CancelarMesaReserva($id: UUID!) @auth(level: USER) {
  mesaReserva_update(id: $id, data: { estado: "cancelada" })
}


mutation DeleteServicio($id: UUID!) @auth(level: PUBLIC) {
  servicio_delete(id: $id)
}

mutation DeleteProducto($id: UUID!) @auth(level: USER) {
  producto_delete(id: $id)
}
