<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f766e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Balneario SA" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/pwa-192.svg" />
    <title>Balneario San Antonio Texas</title>
  </head>
  <body class="bg-gray-50 text-gray-900 font-sans antialiased">
    <header id="app-header" class="app-header"></header>
    <div
      id="app-route-loading"
      class="pointer-events-none fixed inset-0 z-[160] flex items-center justify-center bg-slate-50/75 opacity-0 backdrop-blur-[2px] transition-opacity duration-300 ease-out"
      aria-busy="false"
      aria-hidden="true"
    >
      <div class="flex flex-col items-center gap-3 rounded-2xl border border-slate-200 bg-white px-8 py-6 shadow-xl">
        <span class="app-route-loading-spinner h-10 w-10 rounded-full border-2 border-teal-600 border-t-transparent" aria-hidden="true"></span>
        <p class="text-sm font-bold text-slate-600">Cargando…</p>
      </div>
    </div>
    <div id="app" class="app-route-view min-h-[calc(100vh-64px)] w-full transition-opacity duration-200 ease-out"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
